services:
  - type: web
    name: x-stealth-api
    repo: https://github.com/frontend-en/X-Stealth
    runtime: docker
    region: frankfurt
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m uvicorn src.api.app:app --host 0.0.0.0 --port 10000
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: DRY_RUN
        value: "true"
      - key: POSTING_ENABLED
        value: "false"
      - key: HEADLESS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: TREND_RADAR_TIMEZONE
        value: Europe/Moscow
      - key: TREND_RADAR_WINDOW_HOURS
        value: "24"
      - key: TREND_RADAR_PROFILE
        value: Русскоязычный рынок России и СНГ: новые легальные и этичные модели заработка с помощью ИИ для владельцев малого бизнеса и самостоятельных специалистов
  - type: cron
    name: x-stealth-trend-radar
    repo: https://github.com/frontend-en/X-Stealth
    runtime: docker
    region: frankfurt
    branch: main
    schedule: "0 6 * * *"
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m src.trend_radar_worker
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: TREND_RADAR_TIMEZONE
        value: Europe/Moscow
      - key: TREND_RADAR_WINDOW_HOURS
        value: "24"
      - key: TREND_RADAR_PROFILE
        value: Русскоязычный рынок России и СНГ: новые легальные и этичные модели заработка с помощью ИИ для владельцев малого бизнеса и самостоятельных специалистов
