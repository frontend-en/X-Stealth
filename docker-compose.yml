services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-x_autoposter}
      POSTGRES_USER: ${POSTGRES_USER:-x_autoposter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: x-stealth-autoposter-backend:local
    restart: unless-stopped
    command: python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES:-480}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DRY_RUN: ${DRY_RUN:-true}
      POSTING_ENABLED: ${POSTING_ENABLED:-false}
      DATABASE_URL: ${DOCKER_DATABASE_URL:?DOCKER_DATABASE_URL must be set in .env}
      HEADLESS: ${HEADLESS:-true}
      X_BASE_URL: ${X_BASE_URL:-https://x.com}
      SLOW_MO_MS: ${SLOW_MO_MS:-0}
      VIEWPORT_WIDTH: ${VIEWPORT_WIDTH:-1365}
      VIEWPORT_HEIGHT: ${VIEWPORT_HEIGHT:-768}
      AUTH_STATE_PATH: ${AUTH_STATE_PATH:-auth.json}
      DATA_PATH: ${DATA_PATH:-data/tweets.txt}
      LOGS_DIR: ${LOGS_DIR:-logs}
      SCREENSHOTS_DIR: ${SCREENSHOTS_DIR:-screenshots}
      TRACES_DIR: ${TRACES_DIR:-traces}
      MIN_ACTION_DELAY_MS: ${MIN_ACTION_DELAY_MS:-300}
      MAX_ACTION_DELAY_MS: ${MAX_ACTION_DELAY_MS:-1600}
      MIN_POST_INTERVAL_MINUTES: ${MIN_POST_INTERVAL_MINUTES:-180}
      SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-30}
      SCHEDULER_MAX_PUBLISH_ATTEMPTS: ${SCHEDULER_MAX_PUBLISH_ATTEMPTS:-3}
      WARMUP_MIN_SCROLLS: ${WARMUP_MIN_SCROLLS:-2}
      WARMUP_MAX_SCROLLS: ${WARMUP_MAX_SCROLLS:-5}
      NAVIGATION_TIMEOUT_MS: ${NAVIGATION_TIMEOUT_MS:-60000}
      POST_TIMEOUT_MS: ${POST_TIMEOUT_MS:-45000}
      PROXY_URL: ${PROXY_URL:-}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./backend/auth.json:/app/auth.json:ro
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/screenshots:/app/screenshots
      - ./backend/traces:/app/traces
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Docker serves the dashboard and API through the same Nginx origin.
        # Do not reuse VITE_API_BASE_URL from local Vite development here: it
        # would make browser session cookies cross-origin.
        VITE_API_BASE_URL: ${DOCKER_VITE_API_BASE_URL:-}
    image: x-stealth-autoposter-frontend:local
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

  bot:
    image: x-stealth-autoposter-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m src.scheduler_worker
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DRY_RUN: ${DRY_RUN:-true}
      POSTING_ENABLED: ${POSTING_ENABLED:-false}
      DATABASE_URL: ${DOCKER_DATABASE_URL:?DOCKER_DATABASE_URL must be set in .env}
      HEADLESS: ${HEADLESS:-true}
      X_BASE_URL: ${X_BASE_URL:-https://x.com}
      SLOW_MO_MS: ${SLOW_MO_MS:-0}
      VIEWPORT_WIDTH: ${VIEWPORT_WIDTH:-1365}
      VIEWPORT_HEIGHT: ${VIEWPORT_HEIGHT:-768}
      AUTH_STATE_PATH: ${AUTH_STATE_PATH:-auth.json}
      DATA_PATH: ${DATA_PATH:-data/tweets.txt}
      LOGS_DIR: ${LOGS_DIR:-logs}
      SCREENSHOTS_DIR: ${SCREENSHOTS_DIR:-screenshots}
      TRACES_DIR: ${TRACES_DIR:-traces}
      MIN_ACTION_DELAY_MS: ${MIN_ACTION_DELAY_MS:-300}
      MAX_ACTION_DELAY_MS: ${MAX_ACTION_DELAY_MS:-1600}
      MIN_POST_INTERVAL_MINUTES: ${MIN_POST_INTERVAL_MINUTES:-180}
      SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-30}
      SCHEDULER_MAX_PUBLISH_ATTEMPTS: ${SCHEDULER_MAX_PUBLISH_ATTEMPTS:-3}
      WARMUP_MIN_SCROLLS: ${WARMUP_MIN_SCROLLS:-2}
      WARMUP_MAX_SCROLLS: ${WARMUP_MAX_SCROLLS:-5}
      NAVIGATION_TIMEOUT_MS: ${NAVIGATION_TIMEOUT_MS:-60000}
      POST_TIMEOUT_MS: ${POST_TIMEOUT_MS:-45000}
      PROXY_URL: ${PROXY_URL:-}
    volumes:
      - ./backend/auth.json:/app/auth.json:ro
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/screenshots:/app/screenshots
      - ./backend/traces:/app/traces
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
